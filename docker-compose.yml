services:
  nano-review:
    container_name: nano_review_dev
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      - review-logs:/app/logs
      - review-data:/app/data
    restart: unless-stopped

volumes:
  review-logs:
  review-data:
