                    } else {
                        // Add new review at beginning
                        dashboardState.reviews.unshift(reviewData);
                        if (dashboardState.reviews.length > 10) {
                            dashboardState.reviews = dashboardState.reviews.slice(0, 10);
                        }
                    }
                    updateReviewsTable();
                } else {
                    // Fallback: fetch via API (Phase 1 behavior)
                    var existingIdx = -1;
                    for (var i = 0; i < dashboardState.reviews.length; i++) {
                        if (dashboardState.reviews[i].run_id === runId) {
                            existingIdx = i;
                            break;
                        }
                    }

                    if (existingIdx >= 0) {
                        // Update existing review in place
                        dashboardState.reviews[existingIdx].status = status;
                        if (msg.duration_ms !== undefined) {
                            dashboardState.reviews[existingIdx].duration_ms = msg.duration_ms;
                        }
                        updateReviewsTable();
                    } else {
                        // New review - fetch full details and add to list
                        api.getReview(runId).then(function(r) {
                            if (r) {
                                dashboardState.reviews.unshift(r);
                                if (dashboardState.reviews.length > 10) {
                                    dashboardState.reviews = dashboardState.reviews.slice(0, 10);
                                }
                                updateReviewsTable();
                            }
                        }).catch(function() {
                            // Fetch failed, still add with available data
                            dashboardState.reviews.unshift({
                                run_id: runId,
                                status: status,
                                created_at: new Date().toISOString()
                            });
                            if (dashboardState.reviews.length > 10) {
                                dashboardState.reviews = dashboardState.reviews.slice(0, 10);
                            }
                            updateReviewsTable();
                        });
                    }

                }
            };

            // Handle metrics updates
            dashboardState.onMetricsUpdate = function(msg) {
                if (msg.metrics) {
                    dashboardState.metrics = msg.metrics;
                    updateMetricsCards(msg.metrics);
                }
            };

            ws.on("review_update", dashboardState.onReviewUpdate);
            ws.on("metrics_update", dashboardState.onMetricsUpdate);
        }

        function statCard(label, value) {
            return '<div class="stat-card"><div class="label">' + esc(label) + '</div><div class="value">' + esc(String(value)) + '</div></div>';
        }

        // --- Review list view ---
        var reviewsPageState = {
            status: "",
            repo: "",
            offset: 0,
            reviews: [],
            loading: false,
            onReviewUpdate: null
        };

        function renderReviewList() {
            listState.offset = 0;
            listState.reviews = [];
            renderListContent();
        }

        function renderListContent() {
            var html = '<div class="table-wrap">' +
                '<div class="table-header">' +
                '<h2>Reviews</h2>' +
                '<div class="filters">' +
                '<select id="status-filter" onchange="window.__applyFilter()">' +
                '<option value="">All statuses</option>' +
                '<option value="pending"' + (listState.status === "pending" ? " selected" : "") + '>Pending</option>' +
                '<option value="running"' + (listState.status === "running" ? " selected" : "") + '>Running</option>' +
                '<option value="completed"' + (listState.status === "completed" ? " selected" : "") + '>Completed</option>' +
                '<option value="failed"' + (listState.status === "failed" ? " selected" : "") + '>Failed</option>' +
                '<option value="timed_out"' + (listState.status === "timed_out" ? " selected" : "") + '>Timed out</option>' +
                '<option value="cancelled"' + (listState.status === "cancelled" ? " selected" : "") + '>Cancelled</option>' +
                '</select>' +
                '<input type="text" id="repo-filter" placeholder="Filter by repo..." value="' + esc(listState.repo) + '" onkeydown="if(event.key===\'Enter\')window.__applyFilter()">' +
                '<button class="btn" onclick="window.__applyFilter()">Filter</button>' +
                '</div></div>';

            if (listState.loading) {
                html += '<div class="loading">Loading</div>';
            } else if (listState.reviews.length === 0) {
                html += '<div class="empty">No reviews found</div>';
            } else {
                html += reviewTable(listState.reviews);
                html += '<div class="load-more-wrap"><button class="btn" onclick="window.__loadMore()">Load more</button></div>';
            }

            html += '</div>';
            app.innerHTML = html;
        }

        window.__applyFilter = function() {
            var s = document.getElementById("status-filter");
            var r = document.getElementById("repo-filter");
            listState.status = s ? s.value : "";
            listState.repo = r ? r.value : "";
            listState.offset = 0;
            listState.reviews = [];
            fetchReviews();
        };

        window.__loadMore = function() {
            fetchReviews();
        };

        function fetchReviews() {
            listState.loading = true;
            renderListContent();
            var params = { limit: 20, offset: listState.offset };
            if (listState.status) params.status = listState.status;
            if (listState.repo) params.repo = listState.repo;
            api.listReviews(params).then(function(data) {
                listState.loading = false;
                listState.reviews = listState.reviews.concat(data.reviews || []);
                listState.offset += data.reviews ? data.reviews.length : 0;
                renderListContent();
            }).catch(function() {
                listState.loading = false;
                renderListContent();
            });
        }

        // --- Review table ---
        function reviewTable(reviews) {
            if (!reviews || !reviews.length) {
                return '<div class="empty">No reviews</div>';
            }
            var html = '<table><thead><tr>' +
                '<th>Run ID</th><th>Repo</th><th>PR #</th><th>Status</th><th>Duration</th><th>Created</th><th></th>' +
                '</tr></thead><tbody>';
            reviews.forEach(function(r) {
                html += '<tr>' +
                    '<td><span class="run-id">' + esc(truncate(r.run_id, 8)) + '</span></td>' +
                    '<td>' + esc(basename(r.repo)) + '</td>' +
                    '<td>' + (r.pr_number || '-') + '</td>' +
                    '<td><span class="' + badgeClass(r.status) + '">' + esc(r.status) + '</span></td>' +
                    '<td>' + formatDuration(r.duration_ms) + '</td>' +
                    '<td>' + formatDate(r.created_at) + '</td>' +
                    '<td><a href="#/reviews/' + r.run_id + '" class="view-link">View</a></td>' +
                    '</tr>';
            });
            html += '</tbody></table>';
            return html;
        }

        // --- Review detail view ---
        function renderReviewDetail(runId) {
            app.innerHTML = '<div class="loading">Loading review</div>';
            ws.unsubscribe("all");

            api.getReview(runId).then(function(r) {
                if (!r) {
                    app.innerHTML = '<div class="empty">Review not found</div>';
                    return;
                }
                if (r.status === "pending" || r.status === "running") {
                    renderStreamingView(runId, r);
                } else {
                    renderDetailContent(r, r.claude_output || null);
                }
            }).catch(function() {
                app.innerHTML = '<div class="empty">Failed to load review</div>';
            });
        }

        function renderStreamingView(runId, review) {
            var html = '<div class="detail-header">' +
                '<button class="btn" onclick="location.hash=\'#/reviews\'">&#8592; Back</button>' +
                '<h1>' + esc(truncate(review.run_id, 12)) + '</h1>' +
                '<span class="' + badgeClass(review.status) + '" id="detail-status">' + esc(review.status) + '</span>' +
                '</div>';

            html += '<div class="meta-grid" id="detail-meta">' +
                metaCard("Repo", basename(review.repo)) +
                metaCard("PR Number", "#" + (review.pr_number || "-")) +
                metaCard("Status", review.status) +
                metaCard("Base Branch", review.base_branch || "-") +
                metaCard("Head Branch", review.head_branch || "-") +
                metaCard("Created", formatDate(review.created_at)) +
                '</div>';

            html += '<div class="output-section">' +
                '<div class="output-header">' +
                '<span><span class="streaming-indicator" id="live-indicator"></span>Claude Output (live)</span>' +
                '</div>' +
                '<div class="output-body" id="stream-output" style="max-height:600px;overflow:auto">' +
                '<div class="stream-content" id="stream-content">Waiting for output...</div>' +
                '<button class="scroll-bottom-btn" id="scroll-bottom" onclick="document.getElementById(\'stream-output\').scrollTop=999999">&#8595;</button>' +
                '</div></div>';

            app.innerHTML = html;

            var container = document.getElementById("stream-output");
            var contentEl = document.getElementById("stream-content");
            var renderer = new StreamRenderer(container, contentEl);

            ws.subscribe("run:" + runId);

            var onStream = function(msg) {
                if (contentEl.textContent === "Waiting for output...") {
                    contentEl.textContent = "";
                }
                if (msg.data) renderer.appendData(msg.data);
            };
            var onDone = function() {
                ws.off("stream", onStream);
                ws.off("stream_done", onDone);
                ws.off("review_update", onUpdate);
                ws.unsubscribe("run:" + runId);
                var indicator = document.getElementById("live-indicator");
                if (indicator) indicator.style.display = "none";
                renderer.flushPending();
                api.getReview(runId).then(function(r) {
                    if (r) {
                        var badge = document.getElementById("detail-status");
                        if (badge) {
                            badge.className = badgeClass(r.status);
                            badge.textContent = r.status;
                        }
                    }
                }).catch(function() {});
            };
            var onUpdate = function(msg) {
                if (msg.run_id !== runId) return;
                var badge = document.getElementById("detail-status");
                if (badge && msg.status) {
                    badge.className = badgeClass(msg.status);
                    badge.textContent = msg.status;
                }
            };

            ws.on("stream", onStream);
            ws.on("stream_done", onDone);
            ws.on("review_update", onUpdate);
        }

        function renderDetailContent(r, streamOutput) {
            var html = '<div class="detail-header">' +
                '<button class="btn" onclick="location.hash=\'#/reviews\'">&#8592; Back</button>' +
                '<h1>' + esc(truncate(r.run_id, 12)) + '</h1>' +
                '<span class="' + badgeClass(r.status) + '">' + esc(r.status) + '</span>' +
                '</div>';

            html += '<div class="meta-grid">' +
                metaCard("Repo", basename(r.repo)) +
                metaCard("PR Number", "#" + (r.pr_number || "-")) +
                metaCard("Status", r.status) +
                metaCard("Conclusion", r.conclusion || "-") +
                metaCard("Base Branch", r.base_branch || "-") +
                metaCard("Head Branch", r.head_branch || "-") +
                metaCard("Duration", formatDuration(r.duration_ms)) +
                metaCard("Attempts", String(r.attempts || 0)) +
                metaCard("Created", formatDate(r.created_at)) +
                metaCard("Completed", formatDate(r.completed_at)) +
                '</div>';

            // Check if we have structured stream data for rich rendering
            var isStructured = streamOutput && streamOutput.indexOf('{"type":"') !== -1;

            html += '<div class="output-section">' +
                '<div class="output-header">' +
                '<span>Claude Output</span>' +
                '<button class="btn" onclick="this.closest(\'.output-section\').querySelector(\'.output-body\').classList.toggle(\'collapsed\');this.textContent=this.textContent===\'Expand\'?\'Collapse\':\'Expand\'">' +
                (streamOutput && streamOutput.length > 2000 ? "Expand" : "Collapse") +
                '</button>' +
                '</div>' +
                '<div class="output-body' + (streamOutput && streamOutput.length > 2000 ? ' collapsed' : '') + '">';

            if (isStructured) {
                html += '<div class="stream-content" id="stream-content"></div>';
            } else {
                html += '<pre>' + esc(r.claude_output || "No output available") + '</pre>';
            }

            html += '</div></div>';

            app.innerHTML = html;

            // Render structured stream data
            if (isStructured) {
                var container = document.querySelector("#stream-content");
                if (!container) return;
                var outputBody = container.closest(".output-body");
                var renderer = new StreamRenderer(outputBody || container, container);
                renderer.maxRenderedBlocks = 99999; // Show all for completed reviews
                renderer.appendData(streamOutput);
                renderer.flushPending();
            }
        }

        function metaCard(label, value) {
            return '<div class="meta-card"><div class="label">' + esc(label) + '</div><div class="value">' + esc(String(value)) + '</div></div>';
        }

        // --- Init ---
        Auth.init().then(function() {
            if (!Auth.authEnabled()) {
                route();
                return;
            }
            if (!Auth.authenticated()) {
                app.innerHTML =
                    '<div class="empty">' +
                        '<h2>Welcome to Nano Review</h2>' +
                        '<p style="margin-bottom:1rem;color:var(--text-secondary)">Sign in to view review activity.</p>' +
                        '<button class="btn" id="init-login-btn">Sign in with Google</button>' +
                    '</div>';
                var btn = document.getElementById("init-login-btn");
                if (btn) btn.addEventListener("click", function() { Auth.login(); });
                return;
            }
            route();
        });
    })();
    </script>
</body>
</html>
