<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano Review</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/go.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/sql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/plaintext.min.js"></script>
    <link rel="stylesheet" href="/app.css">
</head>
<body>
    <nav>
        <a href="#/dashboard" class="brand">Nano Review</a>
        <div class="links">
            <a href="#/dashboard" data-nav="dashboard">Dashboard</a>
            <a href="#/reviews" data-nav="reviews">Reviews</a>
        </div>
        <div class="auth-nav" id="auth-nav"></div>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
    </nav>
    <div class="container"><div id="app"></div></div>

    <script>
    (function() {
        "use strict";

        var app = document.getElementById("app");

        // --- WebSocket Manager ---
        var ws = {
            conn: null,
            reconnectDelay: 1000,
            maxReconnectDelay: 30000,
            handlers: {},
            subscriptions: {},
            reconnectTimer: null,
            _onopen: null,
            _onclose: null,

            _getSessionToken: function() {
                var match = document.cookie.match(/(?:^|;\s*)nano_session_token=([^;]*)/);
                return match ? decodeURIComponent(match[1]) : null;
            },

            connect: function() {
                var protocol = location.protocol === "https:" ? "wss:" : "ws:";
                var url = protocol + "//" + location.host + "/ws";

                // Pass session token as query parameter for WebSocket auth.
                var token = ws._getSessionToken();
                if (token) {
                    url += "?token=" + encodeURIComponent(token);
                }
                try {
                    ws.conn = new WebSocket(url);
                } catch(e) {
                    ws.conn = null;
                    ws._scheduleReconnect();
                    return;
                }
                ws.conn.onopen = function() {
                    ws.reconnectDelay = 1000;
                    // Re-subscribe to active topics
                    for (var topic in ws.subscriptions) {
                        if (ws.subscriptions[topic]) {
                            ws._send({type: "subscribe", topic: topic});
                        }
                    }
                    if (ws._onopen) ws._onopen();
                };
                ws.conn.onclose = function() {
                    ws.conn = null;
                    ws._scheduleReconnect();
                    if (ws._onclose) ws._onclose();
                };
                ws.conn.onmessage = function(e) {
                    try {
                        var msg = JSON.parse(e.data);
                        if (msg.type && ws.handlers[msg.type]) {
                            ws.handlers[msg.type].forEach(function(fn) { fn(msg); });
                        }
                    } catch(err) {}
                };
            },

            _scheduleReconnect: function() {
                if (ws.reconnectTimer) return;
                ws.reconnectTimer = setTimeout(function() {
                    ws.reconnectTimer = null;
                    ws.connect();
                }, ws.reconnectDelay);
                ws.reconnectDelay = Math.min(ws.reconnectDelay * 2, ws.maxReconnectDelay);
            },

            _send: function(obj) {
                if (ws.conn && ws.conn.readyState === WebSocket.OPEN) {
                    ws.conn.send(JSON.stringify(obj));
                }
            },

            subscribe: function(topic) {
                ws.subscriptions[topic] = true;
                ws._send({type: "subscribe", topic: topic});
            },

            unsubscribe: function(topic) {
                delete ws.subscriptions[topic];
                ws._send({type: "unsubscribe", topic: topic});
            },

            on: function(type, fn) {
                if (!ws.handlers[type]) ws.handlers[type] = [];
                ws.handlers[type].push(fn);
            },

            off: function(type, fn) {
                if (!ws.handlers[type]) return;
                ws.handlers[type] = ws.handlers[type].filter(function(f) { return f !== fn; });
            },

            disconnect: function() {
                if (ws.reconnectTimer) {
                    clearTimeout(ws.reconnectTimer);
                    ws.reconnectTimer = null;
                }
                ws.subscriptions = {};
                ws.handlers = {};
                if (ws.conn) {
                    ws.conn.onclose = null;
                    ws.conn.close();
                    ws.conn = null;
                }
            }
        };

        // Connect on page load
        ws.connect();

        // --- Theme ---
        var themeBtn = document.getElementById("theme-toggle");
        var sunIcon = "\u2600";
        var moonIcon = "\uD83C\uDF19";

        function setTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            themeBtn.textContent = theme === "dark" ? sunIcon : moonIcon;
            localStorage.setItem("theme", theme);
        }

        (function() {
            var saved = localStorage.getItem("theme");
            if (saved) {
                setTheme(saved);
            } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                setTheme("dark");
            } else {
                setTheme("light");
            }
        })();

        themeBtn.addEventListener("click", function() {
            var current = document.documentElement.getAttribute("data-theme");
            setTheme(current === "dark" ? "light" : "dark");
        });

        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function(e) {
            if (!localStorage.getItem("theme")) {
                setTheme(e.matches ? "dark" : "light");
            }
        });

        // --- Auth state management ---
        var Auth = {
            _user: null,
            _checked: false,
            _authEnabled: true,
            _listeners: [],

            fetchSession: function() {
                return fetch("/auth/me").then(function(r) {
                    if (r.ok) return r.json();
                    return null;
                }).then(function(data) {
                    if (data && data.auth_enabled === false) {
                        Auth._authEnabled = false;
                        Auth._user = null;
                    } else {
                        Auth._user = data;
                    }
                    Auth._checked = true;
                    Auth._notify();
                }).catch(function() {
                    Auth._user = null;
                    Auth._checked = true;
                    Auth._notify();
                });
            },

            login: function() {
                window.location.href = "/auth/login?state=" + encodeURIComponent(window.location.hash || "#/dashboard");
            },

            logout: function() {
                window.location.href = "/auth/logout";
            },

            user: function() { return Auth._user; },
            checked: function() { return Auth._checked; },
            authenticated: function() { return !!Auth._user; },
            authEnabled: function() { return Auth._authEnabled; },

            onChange: function(fn) { Auth._listeners.push(fn); },
            offChange: function(fn) { Auth._listeners = Auth._listeners.filter(function(f) { return f !== fn; }); },

            _notify: function() {
                Auth._listeners.forEach(function(fn) { fn(Auth._user); });
            }
        };

        Auth.init = function() {
            return Auth.fetchSession();
        };

        // --- Auth nav rendering ---
        var authNav = document.getElementById("auth-nav");

        function renderAuthNav(user) {
            if (!Auth.authEnabled()) {
                authNav.innerHTML = "";
                return;
            }
            if (!user) {
                authNav.innerHTML =
                    '<a href="#" class="btn-google-login" id="google-login-btn">' +
                        '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
                            '<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>' +
                            '<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>' +
                            '<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>' +
                            '<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>' +
                        '</svg>' +
                        'Sign in with Google' +
                    '</a>';
                document.getElementById("google-login-btn").addEventListener("click", function(e) {
                    e.preventDefault();
                    Auth.login();
                });
                return;
            }

            var name = user.name || user.email || user.id || "User";
            var initials = name.charAt(0).toUpperCase();
            var avatarHtml = user.picture
                ? '<div class="user-avatar"><img src="' + escapeHtml(user.picture) + '" alt=""></div>'
                : '<div class="user-avatar">' + escapeHtml(initials) + '</div>';

            authNav.innerHTML =
                '<div class="user-menu">' +
                    '<button class="user-menu-btn" id="user-menu-btn">' +
                        avatarHtml +
                        '<span>' + escapeHtml(name) + '</span>' +
                    '</button>' +
                    '<div class="user-dropdown" id="user-dropdown">' +
                        '<button class="logout-btn" id="logout-btn">Sign out</button>' +
                    '</div>' +
                '</div>';

            document.getElementById("user-menu-btn").addEventListener("click", function(e) {
                e.stopPropagation();
                document.getElementById("user-dropdown").classList.toggle("open");
            });

            document.getElementById("logout-btn").addEventListener("click", function() {
                Auth.logout();
            });
        }

        function escapeHtml(s) {
            var d = document.createElement("div");
            d.textContent = s;
            return d.innerHTML;
        }

        function closeUserDropdown() {
            var dd = document.getElementById("user-dropdown");
            if (dd) dd.classList.remove("open");
        }

        document.addEventListener("click", closeUserDropdown);

        Auth.onChange(renderAuthNav);
        if (Auth.checked()) renderAuthNav(Auth.user());

        // --- Helpers ---
        function truncate(str, len) {
            if (!str) return "";
            if (str.length <= len) return str;
            return str.slice(0, len) + "...";
        }

        function basename(url) {
            if (!url) return "";
            var parts = url.replace(/\/$/, "").split("/");
            return parts[parts.length - 1];
        }

        function formatDuration(ms) {
            if (!ms) return "-";
            var s = Math.floor(ms / 1000);
            var m = Math.floor(s / 60);
            s = s % 60;
            var h = Math.floor(m / 60);
            m = m % 60;
            if (h > 0) return h + "h " + m + "m " + s + "s";
            if (m > 0) return m + "m " + s + "s";
            return s + "s";
        }

        function formatDate(iso) {
            if (!iso) return "-";
            var d = new Date(iso);
            return d.toLocaleString();
        }

        function formatPercent(part, total) {
            if (!total) return "0%";
            return Math.round((part / total) * 100) + "%";
        }

        function badgeClass(status) {
            return "badge badge-" + (status || "pending");
        }

        function esc(str) {
            var el = document.createElement("span");
            el.textContent = str;
            return el.innerHTML;
        }

        function wordCount(text) {
            if (!text) return 0;
            return text.trim().split(/\s+/).filter(Boolean).length;
        }

        // --- Marked.js configuration ---
        if (typeof marked !== "undefined") {
            marked.setOptions({ breaks: true, gfm: true });
        }

        function renderMarkdown(text) {
            if (typeof marked !== "undefined") {
                try { return marked.parse(text); } catch(e) { /* fall through */ }
            }
            // Fallback: escape HTML and convert basic markdown
            var html = esc(text)
                .replace(/```(\w*)\n([\s\S]*?)```/g, "<pre><code>$2</code></pre>")
                .replace(/`([^`]+)`/g, "<code>$1</code>")
                .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
                .replace(/\*(.+?)\*/g, "<em>$1</em>")
                .replace(/\n/g, "<br>");
            return html;
        }

        function highlightCode(code, lang) {
            if (typeof hljs !== "undefined") {
                try {
                    if (lang && hljs.getLanguage(lang)) {
                        return hljs.highlight(code, { language: lang }).value;
                    }
                    return hljs.highlightAuto(code).value;
                } catch(e) { /* fall through */ }
            }
            return esc(code);
        }

        // =========================================================
        // StreamParser: JSONL → structured render commands
        // =========================================================
        function StreamParser() {
            this.blocks = {};
            this.toolUseMap = {};
            this.lineBuffer = "";
            this.systemInfo = null;
            this.resultInfo = null;
        }

        StreamParser.prototype.feed = function(jsonlChunk) {
            this.lineBuffer += jsonlChunk;
            var commands = [];
            var lines = this.lineBuffer.split("\n");
            // Last element may be incomplete — keep in buffer
            this.lineBuffer = lines.pop();
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (!line) continue;
                try {
                    var obj = JSON.parse(line);
                    var cmds = this._parseEvent(obj);
                    if (cmds) {
                        if (Array.isArray(cmds)) {
                            for (var j = 0; j < cmds.length; j++) commands.push(cmds[j]);
                        } else {
                            commands.push(cmds);
                        }
                    }
                } catch(e) {
                    commands.push({ type: "RAW", data: line });
                }
            }
            return commands;
        };

        StreamParser.prototype._parseEvent = function(obj) {
            switch(obj.type) {
                case "system": return this._parseSystem(obj);
                case "stream_event": return this._parseStreamEvent(obj);
                case "assistant": return this._parseAssistant(obj);
                case "user": return this._parseUser(obj);
                case "result": return this._parseResult(obj);
                default: return { type: "RAW", data: JSON.stringify(obj) };
            }
        };

        StreamParser.prototype._parseAssistant = function(obj) {
            var message = obj.message;
            if (!message || !message.content) return null;
            var items = Array.isArray(message.content) ? message.content : [message.content];
            var commands = [];
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                // Skip blocks already created by stream_event deltas
                if (this.blocks[i]) continue;
                var blockType = item.type;
                if (blockType === "thinking") {
                    var text = item.thinking || "";
                    this.blocks[i] = { type: "thinking", accumulated: text, name: "", toolUseId: "" };
                    commands.push({ type: "BLOCK_START", data: { index: i, blockType: "thinking", name: "" } });
                    if (text) {
                        commands.push({ type: "BLOCK_DELTA", data: { index: i, blockType: "thinking", text: text } });
                        commands.push({ type: "BLOCK_END", data: { index: i, blockType: "thinking", fullText: text, name: "", toolUseId: "" } });
                    }
                } else if (blockType === "text") {
                    var text = item.text || "";
                    this.blocks[i] = { type: "text", accumulated: text, name: "", toolUseId: "" };
                    commands.push({ type: "BLOCK_START", data: { index: i, blockType: "text", name: "" } });
                    if (text) {
                        commands.push({ type: "BLOCK_DELTA", data: { index: i, blockType: "text", text: text } });
                        commands.push({ type: "BLOCK_END", data: { index: i, blockType: "text", fullText: text, name: "", toolUseId: "" } });
                    }
                } else if (blockType === "tool_use") {
                    var name = item.name || "";
                    var toolUseId = item.id || "";
                    var input = typeof item.input === "string" ? item.input : JSON.stringify(item.input || {});
                    this.blocks[i] = { type: "tool_use", accumulated: input, name: name, toolUseId: toolUseId };
                    if (toolUseId) this.toolUseMap[toolUseId] = i;
                    commands.push({ type: "BLOCK_START", data: { index: i, blockType: "tool_use", name: name, input: input } });
                    if (input) {
                        commands.push({ type: "BLOCK_DELTA", data: { index: i, blockType: "tool_use", text: input } });
                        commands.push({ type: "BLOCK_END", data: { index: i, blockType: "tool_use", fullText: input, name: name, toolUseId: toolUseId } });
                    }
                }
            }
            return commands.length === 1 ? commands[0] : (commands.length > 1 ? commands : null);
        };

        StreamParser.prototype._parseSystem = function(obj) {
            if (obj.subtype === "init") {
                this.systemInfo = {
                    model: obj.model || "unknown",
                    tools: (obj.tools || []).length,
                    version: obj.claude_code_version || "unknown",
                    sessionId: obj.session_id || ""
                };
                return { type: "SYSTEM_INIT", data: this.systemInfo };
            }
            return null;
        };

        StreamParser.prototype._parseStreamEvent = function(obj) {
            var event = obj.event;
            if (!event || !event.type) return null;
            switch(event.type) {
                case "content_block_start": return this._handleBlockStart(event);
                case "content_block_delta": return this._handleBlockDelta(event);
                case "content_block_stop": return this._handleBlockStop(event);
                default: return null;
            }
        };

        StreamParser.prototype._handleBlockStart = function(event) {
            var cb = event.content_block;
            if (!cb) return null;
            var idx = event.index;
            var blockType = cb.type;
            this.blocks[idx] = {
                type: blockType,
                accumulated: "",
                name: cb.name || "",
                toolUseId: cb.id || ""
            };
            if (blockType === "tool_use" && cb.id) {
                this.toolUseMap[cb.id] = idx;
            }
            return { type: "BLOCK_START", data: { index: idx, blockType: blockType, name: cb.name || "" } };
        };

        StreamParser.prototype._handleBlockDelta = function(event) {
            var delta = event.delta;
            if (!delta) return null;
            var idx = event.index;
            var block = this.blocks[idx];
            if (!block) return null;
            switch(delta.type) {
                case "thinking_delta":
                    block.accumulated += (delta.thinking || "");
                    return { type: "BLOCK_DELTA", data: { index: idx, blockType: "thinking", text: delta.thinking || "" } };
                case "text_delta":
                    block.accumulated += (delta.text || "");
                    return { type: "BLOCK_DELTA", data: { index: idx, blockType: "text", text: delta.text || "" } };
                case "input_json_delta":
                    block.accumulated += (delta.partial_json || "");
                    return { type: "BLOCK_DELTA", data: { index: idx, blockType: "tool_use", text: delta.partial_json || "" } };
                default: return null;
            }
        };

        StreamParser.prototype._handleBlockStop = function(event) {
            var idx = event.index;
            var block = this.blocks[idx];
            if (!block) return null;
            return {
                type: "BLOCK_END",
                data: {
                    index: idx,
                    blockType: block.type,
                    fullText: block.accumulated,
                    name: block.name,
                    toolUseId: block.toolUseId
                }
            };
        };

        StreamParser.prototype._parseUser = function(obj) {
            var content = obj.message ? obj.message.content : null;
            if (!content) return null;
            var items = Array.isArray(content) ? content : [content];
            var commands = [];
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                if (item.type === "tool_result" && item.tool_use_id) {
                    commands.push({
                        type: "TOOL_RESULT",
                        data: {
                            toolUseId: item.tool_use_id,
                            blockIndex: this.toolUseMap[item.tool_use_id],
                            content: item.content || "",
                            isError: item.is_error || false
                        }
                    });
                }
            }
            return commands.length === 1 ? commands[0] : (commands.length > 1 ? commands : null);
        };

        StreamParser.prototype._parseResult = function(obj) {
            this.resultInfo = {
                costUsd: obj.cost_usd || 0,
                durationMs: obj.duration_ms || 0,
                apiDurationMs: obj.duration_api_ms || 0,
                isError: obj.is_error || false,
                numTurns: obj.num_turns || 0
            };
            return { type: "RESULT", data: this.resultInfo };
        };

        import StreamRenderer from "./js/stream-renderer.js";


        // =========================================================
        // Cleanup helpers — detach page-specific WebSocket handlers
        // =========================================================

        function cleanupDashboardHandlers() {
            if (dashboardState.onReviewUpdate) {
                ws.off("review_update", dashboardState.onReviewUpdate);
                dashboardState.onReviewUpdate = null;
            }
            if (dashboardState.onMetricsUpdate) {
                ws.off("metrics_update", dashboardState.onMetricsUpdate);
                dashboardState.onMetricsUpdate = null;
            }
        }

        function cleanupReviewsPageHandlers() {
            if (reviewsPageState.onReviewUpdate) {
                ws.off("review_update", reviewsPageState.onReviewUpdate);
                reviewsPageState.onReviewUpdate = null;
            }
        }

        // =========================================================
        // Router
        // =========================================================
        function route() {
            if (!Auth.checked() || (Auth.authEnabled() && !Auth.authenticated())) return;

            var hash = location.hash || "#/dashboard";

            // Cleanup ALL page-specific WebSocket handlers before routing
            cleanupDashboardHandlers();
            cleanupReviewsPageHandlers();

            updateNav(hash);

            if (hash === "#/" || hash === "" || hash === "#/dashboard") {
                renderDashboard();
            } else if (hash === "#/reviews") {
                renderReviewsPage();
            } else {
                var match = hash.match(/^#\/reviews\/(.+)$/);
                if (match) {
                    renderReviewDetail(match[1]);
                } else {
                    renderDashboard();
                }
            }
        }

        function updateNav(hash) {
            document.querySelectorAll("nav a[data-nav]").forEach(function(a) {
                a.classList.toggle("active", hash.indexOf(a.getAttribute("data-nav")) !== -1);
            });
        }

        window.addEventListener("hashchange", route);

        // Track dashboard state for WebSocket updates
        var dashboardState = {
            metrics: null,
            pendingReviews: [],
            runningReviews: [],
            onReviewUpdate: null,
            onMetricsUpdate: null
        };

        // --- Dashboard view ---
        function renderDashboard() {
            app.innerHTML = '<div class="loading">Loading metrics</div>';
            ws.subscribe("all");
            Promise.all([
                api.getMetrics(),
                api.listReviews({ status: "pending", limit: 5 }),
                api.listReviews({ status: "running", limit: 5 })
            ]).then(function(results) {
                var m = results[0];
                var pending = (results[1] && results[1].reviews) || [];
                var running = (results[2] && results[2].reviews) || [];
                renderDashboardContent(m, pending, running);
                setupDashboardWebSocketHandlers();
            }).catch(function() {
                app.innerHTML = '<div class="empty">Failed to load dashboard data</div>';
            });
        }

        function renderDashboardContent(metrics, pendingReviews, runningReviews) {
            dashboardState.metrics = metrics;
            dashboardState.pendingReviews = pendingReviews || [];
            dashboardState.runningReviews = runningReviews || [];

            var html = '<div class="stats-grid">' +
                statCard("Total Reviews", metrics.total_reviews || 0) +
                statCard("Success Rate", formatPercent(metrics.success_count || 0, metrics.total_reviews || 0)) +
                statCard("Avg Duration", formatDuration(metrics.avg_duration_ms || 0)) +
                statCard("Reviews Today", metrics.reviews_today || 0) +
                '</div>' +
                '<div class="table-wrap">' +
                '<div class="table-header"><h2>Status Distribution</h2></div>' +
                statusBar(metrics) +
                '</div>' +
                '<div class="table-wrap">' +
                '<div class="table-header"><h2>Active Reviews</h2></div>' +
                activeReviewsSection(pendingReviews, runningReviews) +
                '</div>';
            app.innerHTML = html;
        }

        function updateMetricsCards(metrics) {
            if (!metrics) return;

            var totalEl = document.querySelector(".stat-card:nth-child(1) .value");
            var successEl = document.querySelector(".stat-card:nth-child(2) .value");
            var durationEl = document.querySelector(".stat-card:nth-child(3) .value");
            var todayEl = document.querySelector(".stat-card:nth-child(4) .value");

            if (totalEl) totalEl.textContent = metrics.total_reviews || 0;
            if (successEl) successEl.textContent = formatPercent(
                metrics.success_count || 0,
                metrics.total_reviews || 0
            );
            if (durationEl) durationEl.textContent = formatDuration(metrics.avg_duration_ms || 0);
            if (todayEl) todayEl.textContent = metrics.reviews_today || 0;
        }

        function setupDashboardWebSocketHandlers() {
            if (dashboardState.onReviewUpdate) {
                ws.off("review_update", dashboardState.onReviewUpdate);
            }
            if (dashboardState.onMetricsUpdate) {
                ws.off("metrics_update", dashboardState.onMetricsUpdate);
            }

            dashboardState.onReviewUpdate = function(msg) {
                var reviewData = msg.review;
                var newStatus = msg.status;

                if (reviewData) {
                    var wasActive = false;
                    var removeIdx;

                    // Check running reviews
                    for (var i = 0; i < dashboardState.runningReviews.length; i++) {
                        if (dashboardState.runningReviews[i].run_id === msg.run_id) {
                            wasActive = true;
                            removeIdx = i;
                            break;
                        }
                    }
                    if (wasActive) {
                        dashboardState.runningReviews.splice(removeIdx, 1);
                    }

                    // Check pending reviews
                    if (!wasActive) {
                        for (var i = 0; i < dashboardState.pendingReviews.length; i++) {
                            if (dashboardState.pendingReviews[i].run_id === msg.run_id) {
                                wasActive = true;
                                removeIdx = i;
                                break;
                            }
                        }
                        if (wasActive) {
                            dashboardState.pendingReviews.splice(removeIdx, 1);
                        }
                    }

                    // If review is now active (pending or running), add it
                    if (newStatus === "running") {
                        dashboardState.runningReviews.unshift(reviewData);
                        if (dashboardState.runningReviews.length > 5) {
                            dashboardState.runningReviews = dashboardState.runningReviews.slice(0, 5);
                        }
                    } else if (newStatus === "pending") {
                        dashboardState.pendingReviews.unshift(reviewData);
                        if (dashboardState.pendingReviews.length > 5) {
                            dashboardState.pendingReviews = dashboardState.pendingReviews.slice(0, 5);
                        }
                    }

                    updateActiveReviews();
                }

                // Status distribution changes with every review update
                updateStatusDistribution();
            };

            dashboardState.onMetricsUpdate = function(msg) {
                if (msg.metrics) {
                    dashboardState.metrics = msg.metrics;
                    updateMetricsCards(msg.metrics);
                    updateStatusDistribution();
                }
            };

            ws.on("review_update", dashboardState.onReviewUpdate);
            ws.on("metrics_update", dashboardState.onMetricsUpdate);
        }

        // --- Dashboard aggregate helpers ---

        function statusBar(metrics) {
            var total = metrics.total_reviews || 0;
            if (total === 0) {
                return '<div class="empty">No reviews yet</div>';
            }

            var completed = metrics.success_count || 0;
            var failed = metrics.failure_count || 0;
            var timedOut = metrics.timed_out_count || 0;
            var cancelled = metrics.cancelled_count || 0;
            var active = total - completed - failed - timedOut - cancelled;

            var segments = "";
            if (completed > 0) segments += '<div class="status-bar__segment status-bar__segment--completed" style="width:' + ((completed/total)*100).toFixed(1) + '%"></div>';
            if (failed > 0) segments += '<div class="status-bar__segment status-bar__segment--failed" style="width:' + ((failed/total)*100).toFixed(1) + '%"></div>';
            if (timedOut > 0) segments += '<div class="status-bar__segment status-bar__segment--timed_out" style="width:' + ((timedOut/total)*100).toFixed(1) + '%"></div>';
            if (cancelled > 0) segments += '<div class="status-bar__segment status-bar__segment--cancelled" style="width:' + ((cancelled/total)*100).toFixed(1) + '%"></div>';
            if (active > 0) segments += '<div class="status-bar__segment status-bar__segment--active" style="width:' + ((active/total)*100).toFixed(1) + '%"></div>';

            var legend = '<div class="status-bar__legend">' +
                '<span class="status-bar__legend-item"><span class="swatch swatch--completed"></span> Completed: ' + completed + '</span>' +
                '<span class="status-bar__legend-item"><span class="swatch swatch--failed"></span> Failed: ' + failed + '</span>' +
                '<span class="status-bar__legend-item"><span class="swatch swatch--timed_out"></span> Timed out: ' + timedOut + '</span>' +
                '<span class="status-bar__legend-item"><span class="swatch swatch--cancelled"></span> Cancelled: ' + cancelled + '</span>' +
                (active > 0 ? '<span class="status-bar__legend-item"><span class="swatch swatch--active"></span> Active: ' + active + '</span>' : '') +
                '</div>';

            return '<div class="status-bar">' + segments + '</div>' + legend;
        }

        function activeReviewsSection(pending, running) {
            var all = (running || []).concat(pending || []);
            if (!all.length) {
                return '<div class="empty">No active reviews</div>';
            }

            var html = '<div class="active-reviews">';
            all.forEach(function(r) {
                html += '<div class="active-review-card">' +
                    '<span class="run-id">' + esc(truncate(r.run_id, 8)) + '</span>' +
                    '<span class="' + badgeClass(r.status) + '">' + esc(r.status) + '</span>' +
                    '<div class="review-info">' +
                    '<span>' + esc(basename(r.repo)) + '</span>' +
                    '<span>#' + (r.pr_number || '-') + '</span>' +
                    '</div>' +
                    '<span>' + formatDuration(r.duration_ms) + '</span>' +
                    '<a href="#/reviews/' + r.run_id + '" class="view-link">View</a>' +
                    '</div>';
            });
            html += '</div>';
            return html;
        }

        function updateStatusDistribution() {
            var container = document.querySelector(".status-bar");
            var legend = document.querySelector(".status-bar__legend");
            if (!container || !dashboardState.metrics) return;

            var m = dashboardState.metrics;
            var total = m.total_reviews || 0;
            if (total === 0) return;

            var completed = m.success_count || 0;
            var failed = m.failure_count || 0;
            var timedOut = m.timed_out_count || 0;
            var cancelled = m.cancelled_count || 0;
            var active = total - completed - failed - timedOut - cancelled;

            var segments = "";
            if (completed > 0) segments += '<div class="status-bar__segment status-bar__segment--completed" style="width:' + ((completed/total)*100).toFixed(1) + '%"></div>';
            if (failed > 0) segments += '<div class="status-bar__segment status-bar__segment--failed" style="width:' + ((failed/total)*100).toFixed(1) + '%"></div>';
            if (timedOut > 0) segments += '<div class="status-bar__segment status-bar__segment--timed_out" style="width:' + ((timedOut/total)*100).toFixed(1) + '%"></div>';
            if (cancelled > 0) segments += '<div class="status-bar__segment status-bar__segment--cancelled" style="width:' + ((cancelled/total)*100).toFixed(1) + '%"></div>';
            if (active > 0) segments += '<div class="status-bar__segment status-bar__segment--active" style="width:' + ((active/total)*100).toFixed(1) + '%"></div>';

            container.innerHTML = segments;

            if (legend) {
                legend.innerHTML =
                    '<span class="status-bar__legend-item"><span class="swatch swatch--completed"></span> Completed: ' + completed + '</span>' +
                    '<span class="status-bar__legend-item"><span class="swatch swatch--failed"></span> Failed: ' + failed + '</span>' +
                    '<span class="status-bar__legend-item"><span class="swatch swatch--timed_out"></span> Timed out: ' + timedOut + '</span>' +
                    '<span class="status-bar__legend-item"><span class="swatch swatch--cancelled"></span> Cancelled: ' + cancelled + '</span>' +
                    (active > 0 ? '<span class="status-bar__legend-item"><span class="swatch swatch--active"></span> Active: ' + active + '</span>' : '');
            }
        }

        function updateActiveReviews() {
            var container = document.querySelector(".active-reviews");
            if (!container) return;

            var all = dashboardState.runningReviews.concat(dashboardState.pendingReviews);
            if (!all.length) {
                var wrap = container.parentElement;
                if (wrap) wrap.innerHTML = '<div class="empty">No active reviews</div>';
                return;
            }

            var html = "";
            all.forEach(function(r) {
                html += '<div class="active-review-card">' +
                    '<span class="run-id">' + esc(truncate(r.run_id, 8)) + '</span>' +
                    '<span class="' + badgeClass(r.status) + '">' + esc(r.status) + '</span>' +
                    '<div class="review-info">' +
                    '<span>' + esc(basename(r.repo)) + '</span>' +
                    '<span>#' + (r.pr_number || '-') + '</span>' +
                    '</div>' +
                    '<span>' + formatDuration(r.duration_ms) + '</span>' +
                    '<a href="#/reviews/' + r.run_id + '" class="view-link">View</a>' +
                    '</div>';
            });
            container.innerHTML = html;
        }

        function statCard(label, value) {
            return '<div class="stat-card"><div class="label">' + esc(label) + '</div><div class="value">' + esc(String(value)) + '</div></div>';
        }

        // --- Review list view ---
        var reviewsPageState = {
            status: "",
            repo: "",
            offset: 0,
            reviews: [],
            loading: false,
            onReviewUpdate: null
        };

        function renderReviewsPage() {
            reviewsPageState.offset = 0;
            reviewsPageState.reviews = [];
            reviewsPageState.loading = true;
            ws.subscribe("all");

            app.innerHTML = '<div class="loading">Loading reviews</div>';

            fetchReviewsForPage(function() {
                renderReviewsPageContent();
                setupReviewsPageWebSocketHandlers();
            });
        }

        function fetchReviewsForPage(callback) {
            reviewsPageState.loading = true;
            var params = { limit: 20, offset: reviewsPageState.offset };
            if (reviewsPageState.status) params.status = reviewsPageState.status;
            if (reviewsPageState.repo) params.repo = reviewsPageState.repo;

            api.listReviews(params).then(function(data) {
                reviewsPageState.loading = false;
                reviewsPageState.reviews = reviewsPageState.reviews.concat(data.reviews || []);
                reviewsPageState.offset += data.reviews ? data.reviews.length : 0;
                if (callback) callback();
            }).catch(function() {
                reviewsPageState.loading = false;
                if (callback) callback();
            });
        }

        function renderReviewsPageContent() {
            var html = '<div class="table-wrap">' +
                '<div class="table-header">' +
                '<h2>Reviews</h2>' +
                '<div class="filters">' +
                '<select id="status-filter" onchange="window.__applyFilter()">' +
                '<option value="">All statuses</option>' +
                '<option value="pending"' + (reviewsPageState.status === "pending" ? " selected" : "") + '>Pending</option>' +
                '<option value="running"' + (reviewsPageState.status === "running" ? " selected" : "") + '>Running</option>' +
                '<option value="completed"' + (reviewsPageState.status === "completed" ? " selected" : "") + '>Completed</option>' +
                '<option value="failed"' + (reviewsPageState.status === "failed" ? " selected" : "") + '>Failed</option>' +
                '<option value="timed_out"' + (reviewsPageState.status === "timed_out" ? " selected" : "") + '>Timed out</option>' +
                '<option value="cancelled"' + (reviewsPageState.status === "cancelled" ? " selected" : "") + '>Cancelled</option>' +
                '</select>' +
                '<input type="text" id="repo-filter" placeholder="Filter by repo..." value="' + esc(reviewsPageState.repo) + '" onkeydown="if(event.key===\'Enter\')window.__applyFilter()">' +
                '<button class="btn" onclick="window.__applyFilter()">Filter</button>' +
                '</div></div>';

            if (reviewsPageState.loading && reviewsPageState.reviews.length === 0) {
                html += '<div class="loading">Loading</div>';
            } else if (reviewsPageState.reviews.length === 0) {
                html += '<div class="empty">No reviews found</div>';
            } else {
                html += '<table><thead><tr>' +
                    '<th>Run ID</th><th>Repo</th><th>PR #</th><th>Status</th><th>Duration</th><th>Created</th><th></th>' +
                    '</tr></thead><tbody id="reviews-table-body">';
                reviewsPageState.reviews.forEach(function(r) {
                    html += reviewRow(r);
                });
                html += '</tbody></table>';
                html += '<div class="load-more-wrap"><button class="btn" onclick="window.__loadMore()">Load more</button></div>';
            }

            html += '</div>';
            app.innerHTML = html;
        }

        function reviewRow(r) {
            return '<tr>' +
                '<td><span class="run-id">' + esc(truncate(r.run_id, 8)) + '</span></td>' +
                '<td>' + esc(basename(r.repo)) + '</td>' +
                '<td>' + (r.pr_number || '-') + '</td>' +
                '<td><span class="' + badgeClass(r.status) + '">' + esc(r.status) + '</span></td>' +
                '<td>' + formatDuration(r.duration_ms) + '</td>' +
                '<td>' + formatDate(r.created_at) + '</td>' +
                '<td><a href="#/reviews/' + r.run_id + '" class="view-link">View</a></td>' +
                '</tr>';
        }

        function updateReviewsPageTable() {
            var tbody = document.getElementById("reviews-table-body");
            if (!tbody) return;
            var html = "";
            for (var i = 0; i < reviewsPageState.reviews.length; i++) {
                html += reviewRow(reviewsPageState.reviews[i]);
            }
            tbody.innerHTML = html;
        }

        function setupReviewsPageWebSocketHandlers() {
            if (reviewsPageState.onReviewUpdate) {
                ws.off("review_update", reviewsPageState.onReviewUpdate);
            }

            reviewsPageState.onReviewUpdate = function(msg) {
                var reviewData = msg.review;
                if (!reviewData) return;

                var runId = reviewData.run_id;
                var statusFilter = reviewsPageState.status;
                var repoFilter = reviewsPageState.repo;

                // Check if review matches active filters
                if (statusFilter && reviewData.status !== statusFilter) {
                    // Review doesn't match status filter — remove if it was in the list
                    var idx = -1;
                    for (var i = 0; i < reviewsPageState.reviews.length; i++) {
                        if (reviewsPageState.reviews[i].run_id === runId) { idx = i; break; }
                    }
                    if (idx >= 0) {
                        reviewsPageState.reviews.splice(idx, 1);
                        updateReviewsPageTable();
                    }
                    return;
                }
                if (repoFilter && basename(reviewData.repo).toLowerCase().indexOf(repoFilter.toLowerCase()) === -1) {
                    return; // Doesn't match repo filter — ignore entirely
                }

                // Update existing or prepend new
                var existingIdx = -1;
                for (var i = 0; i < reviewsPageState.reviews.length; i++) {
                    if (reviewsPageState.reviews[i].run_id === runId) { existingIdx = i; break; }
                }

                if (existingIdx >= 0) {
                    Object.assign(reviewsPageState.reviews[existingIdx], reviewData);
                } else {
                    reviewsPageState.reviews.unshift(reviewData);
                }
                updateReviewsPageTable();
            };

            ws.on("review_update", reviewsPageState.onReviewUpdate);
        }

        window.__applyFilter = function() {
            var s = document.getElementById("status-filter");
            var r = document.getElementById("repo-filter");
            reviewsPageState.status = s ? s.value : "";
            reviewsPageState.repo = r ? r.value : "";
            reviewsPageState.offset = 0;
            reviewsPageState.reviews = [];
            reviewsPageState.loading = true;
            renderReviewsPageContent();
            fetchReviewsForPage(function() {
                renderReviewsPageContent();
            });
        };

        window.__loadMore = function() {
            fetchReviewsForPage(function() {
                renderReviewsPageContent();
            });
        };

        // --- Review detail view ---
        function renderReviewDetail(runId) {
            app.innerHTML = '<div class="loading">Loading review</div>';
            ws.unsubscribe("all");

            api.getReview(runId).then(function(r) {
                if (!r) {
                    app.innerHTML = '<div class="empty">Review not found</div>';
                    return;
                }
                if (r.status === "pending" || r.status === "running") {
                    renderStreamingView(runId, r);
                } else {
                    renderDetailContent(r, r.claude_output || null);
                }
            }).catch(function() {
                app.innerHTML = '<div class="empty">Failed to load review</div>';
            });
        }

        function renderStreamingView(runId, review) {
            var html = '<div class="detail-header">' +
                '<button class="btn" onclick="location.hash=\'#/reviews\'">&#8592; Back</button>' +
                '<h1>' + esc(truncate(review.run_id, 12)) + '</h1>' +
                '<span class="' + badgeClass(review.status) + '" id="detail-status">' + esc(review.status) + '</span>' +
                '</div>';

            html += '<div class="meta-grid" id="detail-meta">' +
                metaCard("Repo", basename(review.repo)) +
                metaCard("PR Number", "#" + (review.pr_number || "-")) +
                metaCard("Status", review.status) +
                metaCard("Base Branch", review.base_branch || "-") +
                metaCard("Head Branch", review.head_branch || "-") +
                metaCard("Created", formatDate(review.created_at)) +
                '</div>';

            html += '<div class="output-section">' +
                '<div class="output-header">' +
                '<span><span class="streaming-indicator" id="live-indicator"></span>Claude Output (live)</span>' +
                '</div>' +
                '<div class="output-body" id="stream-output" style="max-height:600px;overflow:auto">' +
                '<div class="stream-content" id="stream-content">Waiting for output...</div>' +
                '<button class="scroll-bottom-btn" id="scroll-bottom" onclick="document.getElementById(\'stream-output\').scrollTop=999999">&#8595;</button>' +
                '</div></div>';

            app.innerHTML = html;

            var container = document.getElementById("stream-output");
            var contentEl = document.getElementById("stream-content");
            var renderer = new StreamRenderer(container, contentEl);

            ws.subscribe("run:" + runId);

            var onStream = function(msg) {
                if (contentEl.textContent === "Waiting for output...") {
                    contentEl.textContent = "";
                }
                if (msg.data) renderer.appendData(msg.data);
            };
            var onDone = function() {
                ws.off("stream", onStream);
                ws.off("stream_done", onDone);
                ws.off("review_update", onUpdate);
                ws.unsubscribe("run:" + runId);
                var indicator = document.getElementById("live-indicator");
                if (indicator) indicator.style.display = "none";
                renderer.flushPending();
                api.getReview(runId).then(function(r) {
                    if (r) {
                        var badge = document.getElementById("detail-status");
                        if (badge) {
                            badge.className = badgeClass(r.status);
                            badge.textContent = r.status;
                        }
                    }
                }).catch(function() {});
            };
            var onUpdate = function(msg) {
                if (msg.run_id !== runId) return;
                var badge = document.getElementById("detail-status");
                if (badge && msg.status) {
                    badge.className = badgeClass(msg.status);
                    badge.textContent = msg.status;
                }
            };

            ws.on("stream", onStream);
            ws.on("stream_done", onDone);
            ws.on("review_update", onUpdate);
        }

        function renderDetailContent(r, streamOutput) {
            var html = '<div class="detail-header">' +
                '<button class="btn" onclick="location.hash=\'#/reviews\'">&#8592; Back</button>' +
                '<h1>' + esc(truncate(r.run_id, 12)) + '</h1>' +
                '<span class="' + badgeClass(r.status) + '">' + esc(r.status) + '</span>' +
                '</div>';

            html += '<div class="meta-grid">' +
                metaCard("Repo", basename(r.repo)) +
                metaCard("PR Number", "#" + (r.pr_number || "-")) +
                metaCard("Status", r.status) +
                metaCard("Conclusion", r.conclusion || "-") +
                metaCard("Base Branch", r.base_branch || "-") +
                metaCard("Head Branch", r.head_branch || "-") +
                metaCard("Duration", formatDuration(r.duration_ms)) +
                metaCard("Attempts", String(r.attempts || 0)) +
                metaCard("Created", formatDate(r.created_at)) +
                metaCard("Completed", formatDate(r.completed_at)) +
                '</div>';

            // Check if we have structured stream data for rich rendering
            var isStructured = streamOutput && streamOutput.indexOf('{"type":"') !== -1;

            html += '<div class="output-section">' +
                '<div class="output-header">' +
                '<span>Claude Output</span>' +
                '<button class="btn" onclick="this.closest(\'.output-section\').querySelector(\'.output-body\').classList.toggle(\'collapsed\');this.textContent=this.textContent===\'Expand\'?\'Collapse\':\'Expand\'">' +
                (streamOutput && streamOutput.length > 2000 ? "Expand" : "Collapse") +
                '</button>' +
                '</div>' +
                '<div class="output-body' + (streamOutput && streamOutput.length > 2000 ? ' collapsed' : '') + '">';

            if (isStructured) {
                html += '<div class="stream-content" id="stream-content"></div>';
            } else {
                html += '<pre>' + esc(r.claude_output || "No output available") + '</pre>';
            }

            html += '</div></div>';

            app.innerHTML = html;

            // Render structured stream data
            if (isStructured) {
                var container = document.querySelector("#stream-content");
                if (!container) return;
                var outputBody = container.closest(".output-body");
                var renderer = new StreamRenderer(outputBody || container, container);
                renderer.maxRenderedBlocks = 99999; // Show all for completed reviews
                renderer.appendData(streamOutput);
                renderer.flushPending();
            }
        }

        function metaCard(label, value) {
            return '<div class="meta-card"><div class="label">' + esc(label) + '</div><div class="value">' + esc(String(value)) + '</div></div>';
        }

        // --- Init ---
        Auth.init().then(function() {
            if (!Auth.authEnabled()) {
                route();
                return;
            }
            if (!Auth.authenticated()) {
                app.innerHTML =
                    '<div class="empty">' +
                        '<h2>Welcome to Nano Review</h2>' +
                        '<p style="margin-bottom:1rem;color:var(--text-secondary)">Sign in to view review activity.</p>' +
                        '<button class="btn" id="init-login-btn">Sign in with Google</button>' +
                    '</div>';
                var btn = document.getElementById("init-login-btn");
                if (btn) btn.addEventListener("click", function() { Auth.login(); });
                return;
            }
            route();
        });
    })();
    </script>
</body>
</html>
