root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./bin/nano-review ./cmd/server"
bin = "./scripts/run-native.sh"
delay = 1000
exclude_dir = ["bin", "data", "logs", "tmp", "vendor", "tests"]
exclude_regex = ["_test\\.go$"]
include_ext = ["go", "html", "css", "js"]
kill_delay = "2s"
send_interrupt = true
stop_on_error = true

[log]
time = false

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = true
